server.port=4000

# Billing service gRPC (set BILLING_SERVICE_ADDRESS=billing-service when running in Docker)
billing.service.address=${BILLING_SERVICE_ADDRESS:localhost}
billing.service.grpc.port=${BILLING_SERVICE_GRPC_PORT:9001}

# Kafka producer (set KAFKA_BOOTSTRAP_SERVERS=kafka:9092 when running in Docker)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

logging.level.root=info